<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gen Con 2026 Wishlist Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --pink: #ff6b9d;
    --teal: #4ecdc4;
    --purple: #a78bfa;
    --dark: #1a1a2e;
    --cream: #fef6e4;
    --gray: #6c757d;
    --red: #ff4444;
    --yellow: #ffd166;
    --green: #06d6a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* TOP BAR */
  #topbar {
    background: var(--dark);
    color: var(--cream);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid var(--pink);
    flex-wrap: wrap;
  }

  #topbar h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--pink);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  #status-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    flex: 1;
  }

  #status-text {
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--teal);
  }

  #status-text.error { color: var(--red); }
  #status-text.loading { color: var(--yellow); }

  .upload-label {
    display: inline-block;
    padding: 4px 10px;
    background: var(--purple);
    color: var(--cream);
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 2px solid var(--cream);
    cursor: pointer;
    box-shadow: 3px 3px 0 rgba(255,255,255,0.2);
  }
  .upload-label:hover { background: var(--pink); }

  #file-input { display: none; }

  /* MAIN LAYOUT */
  #main {
    display: grid;
    grid-template-columns: 360px 1fr;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 57px);
    gap: 0;
  }

  /* LEFT PANEL */
  #left-panel {
    border-right: 2px solid var(--dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    grid-row: 1 / 3;
  }

  #search-area {
    padding: 14px;
    border-bottom: 2px solid var(--dark);
    background: white;
  }

  #search-area label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }

  #search-input {
    width: 100%;
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    border: 2px solid var(--dark);
    background: var(--cream);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    outline: none;
  }
  #search-input:focus { border-color: var(--pink); }

  #search-hint {
    font-size: 0.65rem;
    color: var(--gray);
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  #results-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* EVENT CARD */
  .event-card {
    border: 2px solid var(--dark);
    background: white;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
  }

  .event-card-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid #e0e0e0;
  }

  .event-title {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .event-meta {
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    color: var(--gray);
    text-transform: uppercase;
  }

  .event-desc {
    font-size: 0.72rem;
    color: #444;
    margin-top: 4px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .badge-row {
    margin-top: 6px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.6rem;
    padding: 2px 6px;
    border: 1.5px solid var(--dark);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .badge-multi { background: var(--teal); color: var(--dark); }
  .badge-one { background: var(--yellow); color: var(--dark); }
  .badge-type { background: var(--purple); color: white; }

  .slot-list {
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .slot-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    border: 2px solid var(--dark);
    background: var(--cream);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: background 0.1s;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
    position: relative;
  }

  .slot-btn:hover { background: var(--pink); color: white; }
  .slot-btn:hover .slot-tickets { color: white; }

  .slot-btn.wishlisted {
    background: var(--teal);
    border-color: var(--dark);
  }

  .slot-btn.conflict {
    border-color: var(--red);
  }

  .slot-day {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-width: 28px;
    font-size: 0.65rem;
  }

  .slot-time {
    flex: 1;
  }

  .slot-dur {
    color: var(--gray);
    font-size: 0.65rem;
  }

  .slot-tickets {
    font-size: 0.65rem;
    color: var(--gray);
    white-space: nowrap;
  }

  .slot-tickets.sold-out {
    color: var(--red);
    font-weight: 700;
  }

  .best-fit-badge {
    position: absolute;
    top: -1px;
    right: -1px;
    background: var(--pink);
    color: white;
    font-size: 0.55rem;
    padding: 1px 4px;
    letter-spacing: 0.05em;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* RIGHT PANEL — GRID */
  #right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #grid-area {
    flex: 1;
    overflow: auto;
    padding: 14px;
  }

  /* WISHLIST PANEL */
  #wishlist-panel {
    border-top: 2px solid var(--dark);
    background: white;
    max-height: 220px;
    overflow-y: auto;
  }

  #wishlist-header {
    padding: 10px 14px 6px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    background: white;
    z-index: 5;
  }

  #wishlist-header h2 {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    font-weight: 700;
  }

  #wishlist-count {
    font-size: 0.65rem;
    background: var(--pink);
    color: white;
    padding: 2px 7px;
    border: 1.5px solid var(--dark);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  #wishlist-items {
    padding: 8px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .wishlist-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border: 2px solid var(--dark);
    background: var(--cream);
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }

  .wishlist-chip.conflict-chip {
    border-color: var(--red);
    background: #fff0f0;
  }

  .chip-title {
    font-weight: 700;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chip-time {
    color: var(--gray);
    font-size: 0.6rem;
    white-space: nowrap;
  }

  .chip-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--red);
    font-weight: 700;
    font-size: 0.85rem;
    line-height: 1;
    padding: 0 2px;
    font-family: 'Space Mono', monospace;
  }
  .chip-remove:hover { color: var(--dark); }

  #wishlist-empty {
    padding: 12px 14px;
    font-size: 0.72rem;
    color: var(--gray);
    font-style: italic;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--gray);
    font-size: 0.75rem;
    line-height: 1.8;
  }

  .empty-state a { color: var(--pink); text-decoration: underline; }
  .empty-state a:hover { color: var(--purple); }

  .empty-state .big {
    font-family: 'Crimson Pro', serif;
    font-size: 1.2rem;
    color: var(--purple);
    display: block;
    margin-bottom: 8px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: var(--purple); }

</style>
</head>
<body>

<div id="topbar">
  <h1>GEN CON 2026 PLANNER</h1>
  <div id="status-area">
    <label class="upload-label" for="file-input">&#8593; Load events.xlsx</label>
    <input type="file" id="file-input" accept=".xlsx,.csv">
    <span id="status-text">AWAITING FILE</span>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div id="search-area">
      <label for="search-input">Search Events</label>
      <input type="text" id="search-input" placeholder="Type event name..." autocomplete="off">
      <div id="search-hint">Searches title, game system, and event type</div>
    </div>
    <div id="results-list">
      <div class="empty-state">
        <span class="big">Load your events file</span>
        1. <a href="https://www.gencon.com/downloads/events.xlsx" target="_blank" rel="noopener">Download events.xlsx from Gen Con</a><br>
        2. Click <strong>Load events.xlsx</strong> above
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="grid-area">
      <div id="grid-container"></div>
    </div>
    <div id="wishlist-panel">
      <div id="wishlist-header">
        <h2>Wishlist</h2>
        <span id="wishlist-count">0</span>
      </div>
      <div id="wishlist-items">
        <div id="wishlist-empty">No events wishlisted yet. Search and click a time slot to add events.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ---- Constants ----
const DAYS = [
  { label: 'THU 7/30', date: '07/30/2026', key: 'thu' },
  { label: 'FRI 7/31', date: '07/31/2026', key: 'fri' },
  { label: 'SAT 8/1',  date: '08/01/2026', key: 'sat' },
  { label: 'SUN 8/2',  date: '08/02/2026', key: 'sun' },
];

let GRID_START_HOUR = 8;
let GRID_END_HOUR   = 26; // extended past midnight by default
let HOURS = GRID_END_HOUR - GRID_START_HOUR;

const EVENT_COLORS = [
  '#ffcad4','#c8f5f3','#e0d7ff','#fff3cd',
  '#d4edda','#fce4ec','#e3f2fd','#f3e5f5',
  '#e8f5e9','#fff8e1','#fbe9e7','#e1f5fe',
];


// ---- IndexedDB Cache ----
const DB_NAME = 'gencon-planner';
const DB_STORE = 'events-file';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function saveToCache(buf) {
  try {
    const db = await openDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put({ buf, date: new Date().toISOString() }, 'last');
      tx.oncomplete = resolve;
      tx.onerror = e => reject(e.target.error);
    });
  } catch (e) { /* cache failure is non-fatal */ }
}

async function loadFromCache() {
  try {
    const db = await openDB();
    return await new Promise((resolve, reject) => {
      const req = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).get('last');
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror = e => reject(e.target.error);
    });
  } catch (e) { return null; }
}

// ---- State ----
let allEvents = [];       // parsed rows
let groupedEvents = {};   // title -> [event, ...]
let wishlist = [];        // array of event objects
let colorMap = {};        // gameId -> color
let colorIdx = 0;
let dataLoaded = false;

// ---- DOM refs ----
const statusText    = document.getElementById('status-text');
const searchInput   = document.getElementById('search-input');
const resultsList   = document.getElementById('results-list');
const gridContainer = document.getElementById('grid-container');
const wishlistItems = document.getElementById('wishlist-items');
const wishlistCount = document.getElementById('wishlist-count');
const wishlistEmpty = document.getElementById('wishlist-empty');
const fileInput     = document.getElementById('file-input');

// ---- Data Loading ----

function parseXlsx(buf, uploadDate) {
  try {
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { raw: false });
    processRows(rows, uploadDate);
  } catch (e) {
    setStatus('error', 'PARSE ERROR: ' + e.message);
    showEmptyState('Could not parse spreadsheet.', 'Make sure you\'re uploading the official events.xlsx from gencon.com.');
  }
}

function processRows(rows, uploadDate) {
  if (!rows.length) {
    setStatus('error', 'NO DATA FOUND IN FILE');
    return;
  }

  // Detect column names (they vary slightly by year)
  const sample = rows[0];
  const keys = Object.keys(sample);

  function findCol(candidates) {
    for (const c of candidates) {
      const found = keys.find(k => k.toLowerCase().includes(c.toLowerCase()));
      if (found) return found;
    }
    return null;
  }

  const COL = {
    id:       findCol(['Game ID', 'id']),
    title:    findCol(['Title', 'title']),
    shortDesc:findCol(['Short Description', 'Short Desc']),
    longDesc: findCol(['Long Description', 'Long Desc']),
    type:     findCol(['Event Type', 'type']),
    system:   findCol(['Game System', 'system']),
    start:    findCol(['Start Date & Time', 'Start Date', 'start']),
    duration: findCol(['Duration', 'duration']),
    tickets:  findCol(['Tickets Available', 'tickets', 'available']),
    location: findCol(['Location', 'location', 'room']),
    gm:       findCol(['GM Names', 'gm', 'host']),
  };

  allEvents = rows.map(row => ({
    id:       row[COL.id] || '',
    title:    (row[COL.title] || '').trim(),
    shortDesc:row[COL.shortDesc] || '',
    longDesc: row[COL.longDesc] || '',
    type:     row[COL.type] || '',
    system:   row[COL.system] || '',
    startRaw: row[COL.start] || '',
    duration: parseFloat(row[COL.duration]) || 1,
    tickets:  parseInt(row[COL.tickets]) || 0,
    location: row[COL.location] || '',
    gm:       row[COL.gm] || '',
  })).filter(e => e.title && e.startRaw).map(e => {
    const { dayKey, startMin } = parseStart(e.startRaw);
    return { ...e, dayKey, startMin };
  }).filter(e => e.dayKey);

  // Compute grid bounds from actual event data
  let minStart = GRID_START_HOUR * 60;
  let maxEnd   = GRID_END_HOUR   * 60;
  for (const ev of allEvents) {
    if (ev.startMin < minStart) minStart = ev.startMin;
    const end = ev.startMin + ev.duration * 60;
    if (end > maxEnd) maxEnd = end;
  }
  GRID_START_HOUR = Math.min(Math.floor(minStart / 60), 8);
  GRID_END_HOUR   = Math.max(Math.ceil(maxEnd   / 60), 24);
  HOURS = GRID_END_HOUR - GRID_START_HOUR;

  // Group by title
  groupedEvents = {};
  for (const ev of allEvents) {
    if (!groupedEvents[ev.title]) groupedEvents[ev.title] = [];
    groupedEvents[ev.title].push(ev);
  }

  dataLoaded = true;
  const dateStr = uploadDate ? ' · uploaded ' + new Date(uploadDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
  setStatus('ok', `${allEvents.length.toLocaleString()} EVENTS${dateStr}`);
  renderGrid();
  if (searchInput.value.length >= 2) doSearch();
  else showEmptyState('Ready!', 'Search for events above to start building your wishlist.');
}

function parseStart(raw) {
  // Expected: "07/31/2026 10:00 AM" or similar
  const m = raw.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (!m) return { dayKey: null, startMin: 0 };

  const [, mo, dy, yr, hr, min, ampm] = m;
  let hours = parseInt(hr);
  if (ampm) {
    if (ampm.toUpperCase() === 'PM' && hours !== 12) hours += 12;
    if (ampm.toUpperCase() === 'AM' && hours === 12) hours = 0;
  }

  const dateStr = `${mo}/${dy}/${yr}`;
  const day = DAYS.find(d => d.date === dateStr);
  if (!day) return { dayKey: null, startMin: 0 };

  return { dayKey: day.key, startMin: hours * 60 + parseInt(min) };
}

// ---- Status ----
function setStatus(type, html) {
  statusText.innerHTML = html;
  statusText.className = type === 'ok' ? '' : type;
}

function showEmptyState(big, small) {
  resultsList.innerHTML = `<div class="empty-state"><span class="big">${big}</span>${small}</div>`;
}

// ---- Search ----
searchInput.addEventListener('input', () => {
  if (!dataLoaded) return;
  const q = searchInput.value.trim();
  if (q.length < 2) {
    showEmptyState('Ready!', 'Search for events above.');
    return;
  }
  doSearch();
});

function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  const matches = Object.keys(groupedEvents).filter(title => {
    if (title.toLowerCase().includes(q)) return true;
    const slots = groupedEvents[title];
    return slots.some(s =>
      s.system.toLowerCase().includes(q) ||
      s.type.toLowerCase().includes(q)
    );
  });

  if (!matches.length) {
    showEmptyState('No results', `No events matching "${searchInput.value.trim()}" found.`);
    return;
  }

  // Sort: exact start > alpha
  matches.sort((a, b) => {
    const aEx = a.toLowerCase().startsWith(q) ? 0 : 1;
    const bEx = b.toLowerCase().startsWith(q) ? 0 : 1;
    return aEx - bEx || a.localeCompare(b);
  });

  resultsList.innerHTML = '';
  for (const title of matches.slice(0, 50)) {
    resultsList.appendChild(buildEventCard(title));
  }
}

// ---- Event Card ----
function buildEventCard(title) {
  const slots = groupedEvents[title];
  const rep = slots[0];

  const card = document.createElement('div');
  card.className = 'event-card';

  const isMulti = slots.length > 1;
  const bestIdx = isMulti ? getBestSlot(slots) : 0;

  const metaParts = [rep.type, rep.system].filter(Boolean);

  card.innerHTML = `
    <div class="event-card-header">
      <div class="event-title">${escHtml(title)}</div>
      <div class="event-meta">${escHtml(metaParts.join(' · '))}</div>
      ${rep.shortDesc ? `<div class="event-desc">${escHtml(rep.shortDesc)}</div>` : ''}
      <div class="badge-row">
        <span class="badge ${isMulti ? 'badge-multi' : 'badge-one'}">${isMulti ? slots.length + ' Times' : 'One Time Only'}</span>
        ${rep.type ? `<span class="badge badge-type">${escHtml(rep.type)}</span>` : ''}
      </div>
    </div>
    <div class="slot-list"></div>
  `;

  const slotList = card.querySelector('.slot-list');

  // Sort slots by day then time
  const sortedSlots = [...slots].sort((a, b) => {
    const da = DAYS.findIndex(d => d.key === a.dayKey);
    const db = DAYS.findIndex(d => d.key === b.dayKey);
    return da - db || a.startMin - b.startMin;
  });

  sortedSlots.forEach((slot, i) => {
    const origIdx = slots.indexOf(slot);
    const isBest = origIdx === bestIdx && isMulti;
    const isWished = wishlist.some(w => w.id === slot.id);
    const hasConflict = !isWished && wishlist.some(w => eventsConflict(w, slot));

    const dayLabel = DAYS.find(d => d.key === slot.dayKey)?.label || slot.dayKey;
    const timeStr = minToTime(slot.startMin);
    const dur = formatDur(slot.duration);
    const tix = slot.tickets === 0 ? '<span class="slot-tickets sold-out">SOLD OUT</span>'
                                   : `<span class="slot-tickets">${slot.tickets} tix</span>`;

    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (isWished ? ' wishlisted' : '') + (hasConflict ? ' conflict' : '');
    btn.innerHTML = `
      ${isBest ? '<span class="best-fit-badge">Best Fit</span>' : ''}
      <span class="slot-day">${dayLabel.split(' ')[0]}</span>
      <span class="slot-time">${timeStr}</span>
      <span class="slot-dur">${dur}</span>
      ${tix}
    `;
    btn.title = isWished ? 'Click to remove from wishlist' : 'Click to add to wishlist';
    btn.addEventListener('click', () => toggleSlot(slot, card, title));
    slotList.appendChild(btn);
  });

  return card;
}

function toggleSlot(slot, card, title) {
  const idx = wishlist.findIndex(w => w.id === slot.id);

  if (idx !== -1) {
    // Remove
    wishlist.splice(idx, 1);
  } else {
    // Add — remove any other slot of same title first (one per event title)
    const existing = wishlist.findIndex(w => w.title === title);
    let inheritColor = null;
    if (existing !== -1) {
      inheritColor = colorMap[wishlist[existing].id];
      wishlist.splice(existing, 1);
    }
    wishlist.push(slot);
    if (!colorMap[slot.id]) {
      colorMap[slot.id] = inheritColor || EVENT_COLORS[colorIdx % EVENT_COLORS.length];
      if (!inheritColor) colorIdx++;
    }
  }

  // Refresh card and downstream
  const newCard = buildEventCard(title);
  card.replaceWith(newCard);
  renderGrid();
  renderWishlist();
}

// ---- Slot Suggestion ----
function getBestSlot(slots) {
  if (!slots.length) return 0;

  let best = 0;
  let bestScore = -Infinity;

  slots.forEach((slot, i) => {
    let score = 0;

    // Hard pref: no conflict
    const conflicts = wishlist.some(w => eventsConflict(w, slot));
    if (!conflicts) score += 1000;

    // Prefer larger free block around it
    score += freeBlockScore(slot);

    // More tickets
    score += slot.tickets * 0.01;

    if (score > bestScore) { bestScore = score; best = i; }
  });

  return best;
}

function freeBlockScore(slot) {
  const dayEvents = wishlist.filter(w => w.dayKey === slot.dayKey);
  const startM = slot.startMin;
  const endM   = slot.startMin + slot.duration * 60;

  // Space before
  let spaceBefore = startM - GRID_START_HOUR * 60;
  for (const w of dayEvents) {
    const wEnd = w.startMin + w.duration * 60;
    if (wEnd <= startM) spaceBefore = Math.min(spaceBefore, startM - wEnd);
  }

  // Space after
  let spaceAfter = GRID_END_HOUR * 60 - endM;
  for (const w of dayEvents) {
    if (w.startMin >= endM) spaceAfter = Math.min(spaceAfter, w.startMin - endM);
  }

  return (spaceBefore + spaceAfter) / 60;
}

function eventsConflict(a, b) {
  if (a.dayKey !== b.dayKey) return false;
  const aEnd = a.startMin + a.duration * 60;
  const bEnd = b.startMin + b.duration * 60;
  return a.startMin < bEnd && b.startMin < aEnd;
}

// ---- Grid Rendering ----
function renderGrid() {
  const ROW_H = 28;
  const TOTAL_H = HOURS * ROW_H;
  const conflictIds = getConflictIds();

  gridContainer.innerHTML = '';

  const outer = document.createElement('div');
  outer.style.cssText = 'display:flex; border:2px solid var(--dark); min-width:500px; box-shadow:4px 4px 0 rgba(0,0,0,0.1); overflow:hidden;';

  // Time label column
  const timeCol = document.createElement('div');
  timeCol.style.cssText = 'flex:0 0 50px; border-right:2px solid var(--dark);';

  const corner = document.createElement('div');
  corner.style.cssText = 'height:36px; background:var(--dark);';
  timeCol.appendChild(corner);

  for (let h = GRID_START_HOUR; h < GRID_END_HOUR; h++) {
    const lbl = document.createElement('div');
    lbl.style.cssText = `height:${ROW_H}px; font-size:0.6rem; color:var(--gray); text-align:right; padding:0 4px; line-height:${ROW_H}px; border-top:1px solid #e0e0e0; font-family:'Space Mono',monospace; white-space:nowrap;`;
    lbl.textContent = formatHour(h);
    timeCol.appendChild(lbl);
  }
  outer.appendChild(timeCol);

  // Day columns
  DAYS.forEach((day, di) => {
    const col = document.createElement('div');
    col.style.cssText = `flex:1; display:flex; flex-direction:column;${di > 0 ? ' border-left:1px solid #e0e0e0;' : ''}`;

    const header = document.createElement('div');
    header.style.cssText = `height:36px; background:var(--dark); color:var(--cream); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; font-family:'Space Mono',monospace; white-space:nowrap;`;
    header.textContent = day.label;
    col.appendChild(header);

    const body = document.createElement('div');
    body.style.cssText = `position:relative; height:${TOTAL_H}px;`;

    // Hour grid lines
    for (let h = 0; h < HOURS; h++) {
      const row = document.createElement('div');
      row.style.cssText = `position:absolute; top:${h * ROW_H}px; left:0; right:0; height:${ROW_H}px; border-top:1px solid #e0e0e0;`;
      body.appendChild(row);
    }

    // Event blocks
    const dayEvents = wishlist.filter(e => e.dayKey === day.key);
    dayEvents.sort((a, b) => a.startMin - b.startMin);

    dayEvents.forEach(ev => {
      const topMin = ev.startMin - GRID_START_HOUR * 60;
      if (topMin < 0 || topMin >= HOURS * 60) return;

      const topPx = (topMin / 60) * ROW_H;
      const heightPx = Math.max(Math.min(ev.duration * ROW_H, TOTAL_H - topPx) - 2, 14);
      const color = colorMap[ev.id] || EVENT_COLORS[0];
      const isConflict = conflictIds.has(ev.id);

      const block = document.createElement('div');
      block.style.cssText = `position:absolute; top:${topPx + 1}px; left:2px; right:2px; height:${heightPx}px; background:${color}; border:2px solid ${isConflict ? 'var(--red)' : 'var(--dark)'}; box-shadow:${isConflict ? '2px 2px 0 var(--red)' : '2px 2px 0 rgba(0,0,0,0.15)'}; border-radius:2px; padding:2px 4px; font-size:0.6rem; font-family:'Space Mono',monospace; cursor:pointer; overflow:hidden; z-index:10; display:flex; flex-direction:column; line-height:1.3;`;
      block.innerHTML = `<div style="font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(ev.title)}</div><div style="opacity:0.75;font-size:0.55rem;">${minToTime(ev.startMin)}</div>`;
      block.title = `${ev.title} — ${minToTime(ev.startMin)}, ${formatDur(ev.duration)} (click to remove)`;
      block.addEventListener('click', () => removeFromWishlist(ev.id));
      body.appendChild(block);
    });

    col.appendChild(body);
    outer.appendChild(col);
  });

  gridContainer.appendChild(outer);
}

function getConflictIds() {
  const conflictIds = new Set();
  for (let i = 0; i < wishlist.length; i++) {
    for (let j = i + 1; j < wishlist.length; j++) {
      if (eventsConflict(wishlist[i], wishlist[j])) {
        conflictIds.add(wishlist[i].id);
        conflictIds.add(wishlist[j].id);
      }
    }
  }
  return conflictIds;
}

function removeFromWishlist(id) {
  const idx = wishlist.findIndex(w => w.id === id);
  if (idx === -1) return;
  const ev = wishlist[idx];
  wishlist.splice(idx, 1);

  // Refresh relevant search card if visible
  const q = searchInput.value.trim().toLowerCase();
  if (q.length >= 2) {
    resultsList.querySelectorAll('.event-card').forEach(card => {
      const titleEl = card.querySelector('.event-title');
      if (titleEl && titleEl.textContent === ev.title) {
        const newCard = buildEventCard(ev.title);
        card.replaceWith(newCard);
      }
    });
  }

  renderGrid();
  renderWishlist();
}

// ---- Wishlist Panel ----
function renderWishlist() {
  wishlistCount.textContent = wishlist.length;
  wishlistItems.innerHTML = '';

  if (!wishlist.length) {
    wishlistItems.appendChild(wishlistEmpty);
    wishlistEmpty.style.display = '';
    return;
  }

  const conflictIds = getConflictIds();

  const sorted = [...wishlist].sort((a, b) => {
    const da = DAYS.findIndex(d => d.key === a.dayKey);
    const db = DAYS.findIndex(d => d.key === b.dayKey);
    return da - db || a.startMin - b.startMin;
  });

  for (const ev of sorted) {
    const chip = document.createElement('div');
    chip.className = 'wishlist-chip' + (conflictIds.has(ev.id) ? ' conflict-chip' : '');

    const dayLabel = DAYS.find(d => d.key === ev.dayKey)?.label.split(' ')[0] || '';

    chip.innerHTML = `
      <span class="chip-title" title="${escHtml(ev.title)}">${escHtml(ev.title)}</span>
      <span class="chip-time">${dayLabel} ${minToTime(ev.startMin)} ${formatDur(ev.duration)}</span>
      <button class="chip-remove" title="Remove from wishlist">×</button>
    `;
    chip.querySelector('.chip-remove').addEventListener('click', () => removeFromWishlist(ev.id));
    wishlistItems.appendChild(chip);
  }
}

// ---- Utilities ----
function minToTime(m) {
  const h = Math.floor(m / 60);
  const min = m % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(min).padStart(2, '0')} ${ampm}`;
}

function formatHour(h) {
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}${ampm}`;
}

function formatDur(d) {
  if (Number.isInteger(d)) return `${d}h`;
  return `${d}h`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ---- File Upload ----
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus('loading', 'PARSING...');
  const reader = new FileReader();
  reader.onload = async ev => {
    const buf = ev.target.result;
    await saveToCache(buf);
    parseXlsx(buf, new Date().toISOString());
  };
  reader.readAsArrayBuffer(file);
});

// ---- Initial render + cache check ----
renderGrid();
renderWishlist();

loadFromCache().then(cached => {
  if (cached) {
    setStatus('loading', 'LOADING SAVED DATA...');
    parseXlsx(cached.buf, cached.date);
  }
});
</script>
